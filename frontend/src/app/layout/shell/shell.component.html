<a class="skip-link" href="#main-content">Hoppa till huvudinnehåll</a>

<div class="shell">
  <div class="shell-sidenav" [class.open]="mobileNavOpen()" [class.collapsed]="navCollapsed()">
    <app-sidenav
      [collapsed]="navCollapsed() && !mobileNavOpen()"
      (collapsedToggle)="toggleDesktopNav()"
      (linkActivated)="closeMobileNav()"
    />
  </div>

  @if (mobileNavOpen()) {
    <div class="shell-backdrop" (click)="closeMobileNav()"></div>
  }

  <div class="shell-content">
    <app-topbar [showSearch]="!isHome()" (menuToggle)="toggleMobileNav()" />
    <main id="main-content" class="page-container">
      <router-outlet></router-outlet>
    </main>
    <app-footer />
  </div>
</div>
