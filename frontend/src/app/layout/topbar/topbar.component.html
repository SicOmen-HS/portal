<button
  type="button"
  class="topbar-menu-btn"
  aria-label="Öppna navigationsmeny"
  (click)="menuToggle.emit()"
>
  <i class="bi bi-list" aria-hidden="true"></i>
</button>

<span class="topbar-brand">Data- och analysportalen</span>

<div class="topbar-actions">
  <div class="ops-status">
    @if (opsStatus().linked) {
      <a routerLink="/status" class="ops-status-link">
        <app-status-badge [tone]="opsStatus().tone" [label]="opsStatus().message" />
      </a>
    } @else {
      <app-status-badge [tone]="opsStatus().tone" [label]="opsStatus().message" />
    }
    <button
      type="button"
      class="ops-status-demo"
      (click)="cycleDemoStatus()"
      aria-label="Växla demo-driftläge (endast för mockupen)"
      title="Växla demo-driftläge (endast för mockupen)"
    >
      <i class="bi bi-arrow-repeat" aria-hidden="true"></i>
    </button>
  </div>

  <a routerLink="/kontakt" class="help-link" aria-label="Hjälp"><i class="bi bi-question-circle" aria-hidden="true"></i> <span aria-hidden="true">Hjälp</span></a>
</div>
