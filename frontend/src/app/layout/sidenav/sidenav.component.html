<div class="sidenav-brand">
  <span class="sidenav-brand-mark" aria-hidden="true">
    <i class="bi bi-hexagon-fill"></i>
  </span>
  <div>
    <span class="sidenav-brand-title">Data- och analysportalen</span>
    <span class="sidenav-brand-subtitle">Mockup</span>
  </div>
</div>

<nav class="sidenav-nav" aria-label="Huvudnavigation">
  <ul>
    @for (item of primaryItems; track item.path) {
      <li>
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.end ?? false }"
          (click)="linkActivated.emit()"
        >
          <i class="bi {{ item.icon }}" aria-hidden="true"></i>
          <span>{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>
</nav>

<button
  type="button"
  class="nav-toggle"
  [attr.aria-expanded]="expanded()"
  (click)="expandedToggle.emit()"
>
  <span>{{ expanded() ? 'Dölj fler menyval' : 'Visa fler menyval' }}</span>
  <i class="bi" [class.bi-chevron-up]="expanded()" [class.bi-chevron-down]="!expanded()" aria-hidden="true"></i>
</button>

@if (expanded()) {
  <nav class="sidenav-nav sidenav-nav-secondary" aria-label="Fler menyval">
    <ul>
      @for (item of secondaryItems; track item.path) {
        <li>
          <a
            [routerLink]="item.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.end ?? false }"
            (click)="linkActivated.emit()"
          >
            <i class="bi {{ item.icon }}" aria-hidden="true"></i>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>
}
