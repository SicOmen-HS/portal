<button
  type="button"
  class="typed-result"
  [class.selected]="selected()"
  [attr.aria-pressed]="selected()"
  (click)="previewRequested.emit(item())"
>
  <span class="typed-result-type">{{ item().type }}</span>
  <span class="typed-result-title">{{ item().title }}</span>
  <span class="typed-result-description">{{ item().description }}</span>
  <span class="typed-result-owner"><i class="bi bi-people" aria-hidden="true"></i>{{ item().owner }}</span>
  <span class="signal-list" aria-label="Egenskaper">
    @for (signal of item().signals.slice(0, 3); track signal) {
      <span><i class="bi bi-check-circle" aria-hidden="true"></i>{{ signal }}</span>
    }
  </span>
  <span class="preview-action">Förhandsvisa <i class="bi bi-chevron-right" aria-hidden="true"></i></span>
</button>
